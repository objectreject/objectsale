name: Scrape sales data

on:
  schedule:
    - cron: "0 13 * * *" # ~6am Pacific
  workflow_dispatch: {}

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python scripts/scrape.py
      - name: commit if changed
        run: |
          git config user.name "objectsale bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/sales.json data/geocode-cache.json
          git diff --cached --quiet || git commit -m "update sales data"
          git push
