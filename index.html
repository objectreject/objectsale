<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>objectsale</title>
<link rel="stylesheet" href="styles.css?v=6">
</head>
<body>

<div id="topbar">
  <h1>objectsale</h1>
  <div class="spacer"></div>
  <div id="data-age" class="stat-pill">loading…</div>
</div>

<div id="app">

  <div id="planner">
    <div class="field">
      <label>Date</label>
      <input type="date" id="date-input">
    </div>
    <div class="field">
      <label>Starting zip</label>
      <input type="text" id="zip-input" placeholder="e.g. 90210" inputmode="numeric" maxlength="5">
    </div>
    <div class="field field-wide">
      <label>Radius</label>
      <select id="radius-input">
        <option value="15">15 mi</option>
        <option value="25">25 mi</option>
        <option value="50" selected>50 mi</option>
        <option value="75">75 mi</option>
        <option value="150">150 mi</option>
        <option value="99999">Any distance</option>
      </select>
    </div>
    <button class="btn-primary" id="plan-btn" onclick="findSales()">Find sales</button>
  </div>

  <div id="status"></div>

  <div id="plan-section" style="display:none">
    <h2>Your Plan</h2>
    <div id="plan-empty" class="empty-state">Check off sales below to build your route.</div>
    <div id="plan-results"></div>
  </div>

  <div id="browse-section" style="display:none">
    <div class="tabs">
      <button class="tab-btn active" data-tab="weekend" onclick="switchTab('weekend')">Weekend Sales <span class="tab-count" id="weekend-count"></span></button>
      <button class="tab-btn" data-tab="ongoing" onclick="switchTab('ongoing')">Ongoing <span class="tab-count" id="ongoing-count"></span></button>
    </div>
    <div id="tab-weekend" class="tab-panel"></div>
    <div id="tab-ongoing" class="tab-panel" style="display:none"></div>
  </div>

</div>

<script src="app.js?v=4"></script>
</body>
</html>
